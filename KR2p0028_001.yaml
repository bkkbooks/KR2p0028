body:
  text: 凡物由亡生亡望天生倫人生化有天有命有地有形有物有容有盡有厚有地有形有盡而後有厚有天有命有物有名有物有容有稱有名有命有文有名而後有倫有物有由有尾而後教生有生有知而後好惡生有仁有知有義有禮有美有善有聖有善天生百物人為貴人之道也或由中出或由外入由中出者仁忠信由外入者禮樂刑仁義為之臬愛善之謂仁喪仁之端也上下皆得其所之謂信信非至齊也其生也亡為乎其刑生德德生禮禮生樂由樂知刑知禮然後知刑知禮然後知刑刑非嚴也禮因人之情而為之節文者也善理而後樂生賢者能理之禮生於莊樂生於度禮齊樂靈則戚樂繁禮靈則慢樂禮不同不豐不殺知己而後知人知人而後知禮知禮而後知行知天所為知人所為然後知道知道然後知命其智博然後知命詩所以會古今之志也書所以會者也禮交之行述也樂或生或教者也易所以會天道人道也春秋所以會古今之事也察天道以化民氣凡有血氣者皆有喜有怒有慎有莊其體有容有色有聲有嗅有味有氣有志凡物有本有化有終有始容色目司也聲耳司也嗅鼻司也味口司也氣容司也志心司為孝此非孝也為悌此非悌也不可為也而不可不為也為之此非也弗為此非也義亡能為也人亡能為人亡能為者義然不然正其然而行治焉爾也正不達文生乎不達其然也學學其斯也當其然而行治焉義亡能為也父子識上下也兄弟識先後也兄弟識先後也亡物不物皆至焉而亡非己取之者仁生於人義生於道或生於內或生於外厚於仁薄於義親而不尊厚於義薄於仁尊而不親別君父有親有尊長悌親道也友君臣無親也君臣朋友其擇者也賓客清廟之文也有察善亡為善察所知察所不知勢與聲為可察也備之謂聖服之謂聽盈聖之謂聖決缺生乎未得有生乎名決與信器也各以譫詞毀也號與容與夫其行者食邪色邪疾悲亡其所也亡非是之弗也者御寇不逮從一道多好者亡好者也數不盡也詩由敬作求者無有自來也權可去可歸凡同者通物各止於其所我行皆有之止之凡物由亡生性生仁仁生忠忠生信信生德德生禮禮生樂由樂知刑
